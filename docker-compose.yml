version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: airlink-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin@123
      MYSQL_DATABASE: airlink
      MYSQL_USER: airlink
      MYSQL_PASSWORD: change-me-app
      RADIUS_DB_USER: radius
      RADIUS_DB_PASS: admin@123
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/db/init.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "127.0.0.1:3306:3306"
    networks:
      - airlink-network

  redis:
    image: redis:7-alpine
    container_name: airlink-redis
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - airlink-network

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: airlink-app
    restart: always
    depends_on:
      - db
      - redis
    environment:
      APP_NAME: Airlink
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: airlink
      DB_USERNAME: airlink
      DB_PASSWORD: change-me-app
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: database
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    volumes:
      - ./backend/storage:/app/storage
    networks:
      - airlink-network

  radius:
    build:
      context: ./docker/radius
    container_name: airlink-radius
    restart: always
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: airlink
      RADIUS_DB_USER: radius
      RADIUS_DB_PASS: admin@123
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    networks:
      - airlink-network

networks:
  airlink-network:
    driver: bridge

volumes:
  db-data:
  redis-data:
